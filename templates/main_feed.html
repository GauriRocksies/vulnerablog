{% extends "base.html" %} {% block content %}

<div class="feed-container">
  {% for post in posts %}

  <div class="post-card">
    <h2>
      <a href="/post/{{post.id}}/"> {{post.title}} </a>
    </h2>

    <p>{{post.content|truncatewords:40}}</p>

    <span>by {{post.author.username}}</span>
  </div>

  {% endfor %}
</div>

{% endblock %}
