{% extends 'base_auth.html' %}
{% block title %}Reset Password — VulneraBlog{% endblock %}

{% block form_content %}
<div class="auth-header">
  <h2 class="auth-title">Reset Password</h2>
  <p class="auth-subtitle">
    Enter the email address linked to your account and we'll send you a reset link.
  </p>
</div>

<form method="post" class="auth-form">
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label" for="id_email">EMAIL ADDRESS</label>
    <input
      type="email"
      name="email"
      id="id_email"
      class="form-input"
      placeholder="Enter your email address"
      required
      autofocus
    />
  </div>

  <button type="submit" class="btn-signin">Send Reset Link</button>

  <p class="auth-switch-text">
    Remembered it?
    <a href="{% url 'login' %}" class="auth-switch-link">Back to Sign In</a>
  </p>
</form>
{% endblock %}
